name: typescript-checks

on:
  pull_request:
    paths:
      - "typescript/**"
      - ".github/workflows/typescript-checks.yml"
  push:
    branches:
      - main
    paths:
      - "typescript/**"
      - ".github/workflows/typescript-checks.yml"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@8f24390df009a496891208e5e36b8a1de1f45135 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Tests
        run: bun test

      - name: Build
        run: bun run build
